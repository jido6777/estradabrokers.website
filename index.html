<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0f172a;color:white;}

header{
position:fixed;top:0;width:100%;padding:15px;text-align:center;
background:rgba(2,6,23,0.7);
backdrop-filter:blur(10px);
z-index:1000;
}

.hero{
height:70vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1920&q=80');
background-size:cover;
background-position:center;
padding-top:100px;
gap:25px;
}

.hero-title{
font-size:28px;
font-weight:700;
text-align:center;
max-width:600px;
opacity:0;
transform:translateY(20px);
animation:fadeUp 1s ease forwards;
animation-delay:0.8s;
text-shadow:0 2px 12px rgba(0,0,0,0.8), 0 1px 3px rgba(0,0,0,0.9);
line-height:1.3;
}

.hero-sub{
font-size:14px;
font-weight:400;
color:rgba(255,255,255,0.85);
text-align:center;
opacity:0;
transform:translateY(20px);
animation:fadeUp 1s ease forwards;
animation-delay:1.1s;
text-shadow:0 1px 6px rgba(0,0,0,0.8);
letter-spacing:0.5px;
}

@keyframes fadeUp{
to{opacity:1;transform:translateY(0);}
}

.buttons{
display:flex;gap:15px;flex-wrap:wrap;justify-content:center;
}

.btn{
padding:10px 20px;
background:#38bdf8;
border:none;border-radius:20px;
cursor:pointer;font-weight:600;color:black;
transition:all 0.25s ease;
}

.btn:hover{
transform:translateY(-4px) scale(1.05);
box-shadow:0 10px 25px rgba(56,189,248,0.4);
}

.btn.active{
border:2px solid white;color:white;
box-shadow:0 0 15px rgba(255,255,255,0.3);
}

.filters{text-align:center;margin:20px;}

.price-wrapper{
display:inline-flex;align-items:center;
background:white;border-radius:12px;
padding:6px 12px;color:black;gap:6px;
}

.currency,.cop{font-weight:700;}

.price-wrapper input{
border:none;outline:none;
width:120px;text-align:center;
font-weight:600;
}

.container{padding:40px;}

.properties{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:22px;
}

/* Loading y empty state */
.state-msg{
text-align:center;
padding:60px 20px;
color:rgba(255,255,255,0.5);
font-size:16px;
grid-column:1/-1;
}
.state-msg i{
display:block;
font-size:40px;
margin-bottom:12px;
color:#38bdf8;
}

.card{
background:#1e293b;border-radius:16px;
overflow:hidden;
transition:all 0.4s ease;
opacity:0;transform:translateY(30px);
border:1px solid rgba(255,255,255,0.06);
}

.card.show{opacity:1;transform:translateY(0);}

.card:hover{
transform:translateY(-8px);
box-shadow:0 24px 48px rgba(0,0,0,0.5);
border-color:rgba(56,189,248,0.25);
}

.slider{position:relative;height:240px;overflow:hidden;}
.slides{display:flex;transition:transform 0.5s;}
.slide{min-width:100%;overflow:hidden;position:relative;}

.slide img,.slide video{
width:100%;height:240px;object-fit:cover;
transition:transform 0.5s ease;
cursor:pointer;
}

.card:hover img,.card:hover video{transform:scale(1.06);}

/* === OVERLAY ESTILO FINCARAIZ === */
/* Capa de desenfoque/viñeta lateral */
.slider::before{
content:'';
position:absolute;
inset:0;
background:
  linear-gradient(to right, rgba(0,0,0,0.18) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.18) 100%);
z-index:2;pointer-events:none;
}

/* Gradiente inferior principal — donde vive la info */
.slider-overlay{
position:absolute;
bottom:0;left:0;right:0;
padding:40px 14px 12px;
background:linear-gradient(
  to top,
  rgba(0,0,0,0.82) 0%,
  rgba(0,0,0,0.55) 40%,
  rgba(0,0,0,0.15) 70%,
  transparent 100%
);
backdrop-filter:blur(0px);
-webkit-backdrop-filter:blur(0px);
z-index:4;
pointer-events:none;
transition:opacity 0.3s;
}

/* Info superpuesta sobre la imagen */
.overlay-badge{
display:inline-block;
font-size:9px;font-weight:700;
padding:2px 7px;border-radius:20px;
text-transform:uppercase;letter-spacing:0.6px;
margin-bottom:5px;
}
.overlay-badge.badge-arriendo{background:rgba(56,189,248,0.25);color:#7dd3fa;border:1px solid rgba(56,189,248,0.4);}
.overlay-badge.badge-compra  {background:rgba(52,211,153,0.25);color:#6ee7b7;border:1px solid rgba(52,211,153,0.4);}
.overlay-badge.badge-lote    {background:rgba(251,191,36,0.25); color:#fcd34d;border:1px solid rgba(251,191,36,0.4);}
.overlay-badge.badge-arrendado{background:rgba(239,68,68,0.25);color:#fca5a5;border:1px solid rgba(239,68,68,0.4);}
.overlay-badge.badge-vendido  {background:rgba(168,85,247,0.25);color:#d8b4fe;border:1px solid rgba(168,85,247,0.4);}

.overlay-title{
font-size:13px;font-weight:700;
color:#fff;
line-height:1.3;
margin-bottom:2px;
text-shadow:0 1px 6px rgba(0,0,0,0.8);
display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.overlay-price{
font-size:15px;font-weight:800;
color:#38bdf8;
text-shadow:0 1px 8px rgba(0,0,0,0.6);
display:block;
line-height:1.2;
}
.overlay-price-label{
font-size:9px;color:rgba(255,255,255,0.5);
font-weight:500;letter-spacing:0.3px;
margin-left:2px;
}
.overlay-location{
font-size:11px;color:rgba(255,255,255,0.65);
display:flex;align-items:center;gap:4px;
margin-top:3px;
}
.overlay-location i{color:#38bdf8;font-size:10px;}

/* Photo count badge */
.photo-count{
position:absolute;bottom:12px;right:12px;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(6px);
-webkit-backdrop-filter:blur(6px);
color:white;font-size:11px;font-weight:600;
padding:4px 9px;border-radius:20px;
display:flex;align-items:center;gap:4px;
z-index:5;pointer-events:none;
border:1px solid rgba(255,255,255,0.12);
}
.photo-count i{font-size:10px;color:#38bdf8;}

.expand-icon{
position:absolute;
top:10px;right:10px;
pointer-events:none;
transition:opacity 0.3s;
opacity:0;
z-index:5;
}
.expand-icon i{
color:white;font-size:15px;
text-shadow:0 0 8px rgba(0,0,0,0.9);
}
.card:hover .expand-icon{opacity:0.85;}


/* Thumbnail de video en card */
.video-thumb-slide{
height:240px;
background:linear-gradient(135deg,#0f2744,#1e3a5f);
display:flex;align-items:center;justify-content:center;
cursor:pointer;
}
.video-thumb-box{
display:flex;flex-direction:column;
align-items:center;gap:10px;
transition:transform 0.3s;
}
.video-thumb-slide:hover .video-thumb-box{transform:scale(1.1);}
.video-thumb-icon{
font-size:42px;color:#38bdf8;
}
.video-thumb-label{
font-size:13px;font-weight:600;
color:rgba(255,255,255,0.8);
letter-spacing:0.5px;
}

.arrow{
position:absolute;top:50%;transform:translateY(-50%);
background:none;
color:white;border:none;padding:6px 10px;
cursor:pointer;z-index:2;
font-size:20px;
text-shadow:0 0 8px rgba(0,0,0,0.9),0 2px 12px rgba(0,0,0,0.8);
opacity:0;
transition:opacity 0.2s;
}
.slider:hover .arrow{opacity:0.9;}
.arrow:hover{opacity:1 !important;}


.dots{
position:absolute;top:10px;width:100%;text-align:center;
z-index:5;
}

.dot{
height:8px;width:8px;margin:0 4px;
background:white;border-radius:50%;
display:inline-block;opacity:0.4;
cursor:pointer;transition:all 0.3s;
}

.dot.active{opacity:1;transform:scale(1.3);}

/* card-meta y card-top visibles ahora que no hay overlay */
.card-meta{ display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.card-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:6px; }

.card-content{padding:12px 14px 14px;}

.card-top{
display:flex;justify-content:space-between;
align-items:flex-start;gap:8px;
margin-bottom:6px;
}

.card-content h3{
font-size:15px;
font-weight:700;
margin-bottom:0;
line-height:1.35;
flex:1;
}

.card-price-block{
text-align:right;
flex-shrink:0;
}

.price{
color:#38bdf8;font-weight:800;font-size:17px;
display:block;
line-height:1.2;
}

.price-label{
font-size:10px;
color:rgba(255,255,255,0.4);
font-weight:500;
letter-spacing:0.3px;
}

.card-location{
  display:flex; align-items:center; gap:5px;
  font-size:12px; color:rgba(255,255,255,0.5);

}
.card-location i{ color:#38bdf8; font-size:11px; }

.card-features{
display:flex;gap:6px;flex-wrap:wrap;
margin-bottom:10px;
padding:8px 0;
border-bottom:1px solid rgba(255,255,255,0.06);
}

.feat-chip{
display:flex;align-items:center;gap:5px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.09);
border-radius:8px;
padding:5px 9px;
font-size:12px;font-weight:600;
color:rgba(255,255,255,0.8);

}

color:#38bdf8;font-size:11px;
}
.feat-chip:hover{
background:rgba(56,189,248,0.1);

}

.card-meta{
display:flex;align-items:center;gap:8px;
margin-bottom:8px;
}

.card-badge{
font-size:10px;font-weight:700;
padding:3px 9px;border-radius:20px;
text-transform:uppercase;letter-spacing:0.5px;
}
.badge-arriendo{background:rgba(56,189,248,0.15);color:#38bdf8;border:1px solid rgba(56,189,248,0.35);}
.badge-compra  {background:rgba(52,211,153,0.15);color:#34d399;border:1px solid rgba(52,211,153,0.35);}
.badge-lote    {background:rgba(251,191,36,0.15); color:#fbbf24;border:1px solid rgba(251,191,36,0.35);}
.badge-arrendado{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.35);}

/* Card no disponible */
.card.unavailable .slider::after{
  content:'';
  position:absolute;inset:0;
  background:rgba(0,0,0,0.55);
  z-index:6;pointer-events:none;
}
.unavailable-stamp{
  position:absolute;

  pointer-events:none;

  border-radius:8px;
  padding:6px 14px;

  letter-spacing:2px;
  text-transform:uppercase;
  white-space:nowrap;
  opacity:0.92;
}
.unavailable-stamp.stamp-arrendado{color:#f87171;}
.unavailable-stamp.stamp-vendido  {color:#c084fc;}

.card-divider{
border:none;
border-top:1px solid rgba(255,255,255,0.08);

}

.card-description{
font-size:12px;
color:rgba(255,255,255,0.55);

margin-bottom:4px;

.ver-mas-btn{

color:#38bdf8;

transition:opacity 0.2s;

.ver-mas-btn:hover{opacity:0.75;}

.card-actions{display:flex;gap:8px;margin-top:0;}

.action-btn{

flex:1;

.action-btn.whatsapp{background:#25d366;}
.action-btn.whatsapp:hover{background:#1fad55;transform:translateY(-2px);box-shadow:0 8px 20px rgba(37,211,102,0.35);}
.action-btn.location{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);}
.action-btn.location:hover{background:rgba(255,255,255,0.14);transform:translateY(-2px);}

.contact{
text-align:center;padding:40px;background:#020617;
}

.contact-group{
display:flex;justify-content:center;
flex-wrap:wrap;gap:8px;margin-top:10px;
}

.contact-group a{
display:flex;align-items:center;
gap:6px;color:white;text-decoration:none;
padding:6px 10px;border-radius:10px;
transition:all 0.25s ease;
}

.contact-group a:hover{
transform:translateY(-3px) scale(1.05);
text-shadow:0 5px 15px rgba(255,255,255,0.4);
}

/* VISOR */
.viewer{
position:fixed;top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.96);
display:none;
flex-direction:column;
justify-content:center;align-items:center;
z-index:9999;
}
.viewer.active{display:flex;}

/* Barra superior del visor */
.viewer-topbar{
position:absolute;top:0;left:0;right:0;
padding:14px 20px;

background:linear-gradient(to bottom,rgba(0,0,0,0.6),transparent);

}
.viewer-counter{
color:rgba(255,255,255,0.7);
font-size:13px;font-weight:600;

}
.viewer-close{
background:none;
border:none;color:white;font-size:24px;
cursor:pointer;
opacity:0.8;
transition:opacity 0.2s,transform 0.2s;

line-height:1;
padding:4px;
text-shadow:0 2px 8px rgba(0,0,0,0.6);
}
.viewer-close:hover{opacity:1;transform:scale(1.15);}

/* Hint de swipe en móvil */
.viewer-hint{
position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
color:rgba(255,255,255,0.35);font-size:11px;
pointer-events:none;letter-spacing:0.5px;

}
@media(max-width:768px){.viewer-hint{display:block;}}

.viewer-media-wrap{
position:relative;display:flex;
align-items:center;justify-content:center;

}

#viewerImg{

.video-controls{

.video-controls button:hover{transform:scale(1.2);color:#38bdf8;}

<script>
/* =============================================
   CONFIGURACIÓN
   ============================================= */
const JSON_URL = "assets/data/properties.json"; // ruta al JSON

/* =============================================
   ESTADO GLOBAL
   ============================================= */
let allProperties = [];
let currentType   = "all";
let intervals     = [];

/* =============================================
   INICIO — cargar JSON
   ============================================= */
async function loadProperties() {
  try {
    const res = await fetch(JSON_URL);
    if (!res.ok) throw new Error("No se pudo cargar el JSON");
    allProperties = await res.json();
    render();
  } catch (err) {
    document.getElementById("properties").innerHTML =
      `<div class="state-msg">
        <i class="fas fa-exclamation-triangle" style="color:#f87171"></i>
        Error cargando propiedades.<br>
        <small style="font-size:12px;opacity:0.6;">${err.message}</small>
      </div>`;
    console.error(err);
  }
}

/* =============================================
   UTILIDADES
   ============================================= */
function formatNumber(num) {
  return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
}

function isVideo(url) {
  // Detecta videos por extensión; todo lo demás se trata como imagen (jpg, png, webp, avif, gif, etc.)
  return /\.(mp4|webm|ogg|mov|m4v|avi|mkv)(\?.*)?$/i.test(url);
}

function fmtTime(s) {
  const m   = Math.floor(s / 60);
  const sec = Math.floor(s % 60).toString().padStart(2, "0");
  return `${m}:${sec}`;
}

/* =============================================
   FILTRO DE PRECIO
   ============================================= */
const input = document.getElementById("maxPrice");
input.addEventListener("input", () => {
  const val = input.value.replace(/[^0-9]/g, "");
  input.value = formatNumber(val);
  render();
});

/* =============================================
   REVEAL ON SCROLL
   ============================================= */
function revealCards() {
  document.querySelectorAll(".card").forEach(card => {
    if (card.getBoundingClientRect().top < window.innerHeight - 50) {
      card.classList.add("show");
    }
  });
}
window.addEventListener("scroll", revealCards);

/* =============================================
   DOTS
   ============================================= */
function createDots(total) {
  const dots = Array.from({ length: total }, (_, i) =>
    `<span class="dot ${i === 0 ? "active" : ""}" onclick="goToSlide(this,${i})"></span>`
  ).join("");
  return `<div class="dots">${dots}</div>`;
}

/* =============================================
   RENDER PROPIEDADES
   ============================================= */
function render() {
  intervals.forEach(i => clearInterval(i));
  intervals = [];

  const max = parseInt(input.value.replace(/,/g, "")) || Infinity;
  const container = document.getElementById("properties");
  container.innerHTML = "";

  const filtered = allProperties.filter(p =>
    (currentType === "all" || p.type === currentType) && p.price <= max
  );

  if (filtered.length === 0) {
    container.innerHTML = `<div class="state-msg">
      <i class="fas fa-search"></i>
      No hay propiedades para este filtro.
    </div>`;
    return;
  }

  filtered.forEach((p, idx) => {
    p._id = idx;
    const slides = p.media.map(m => {
      if (isVideo(m)) {
        // Se muestra como thumbnail clickeable — NO se precarga el video
        // Esto permite videos de larga duración sin afectar la carga de la página
        return `<div class="slide video-thumb-slide" data-video="${m}" style="cursor:pointer;">
          <div class="video-thumb-box">
            <i class="fas fa-film video-thumb-icon"></i>
            <span class="video-thumb-label">Ver video</span>
          </div>
          <div class="expand-icon"><i class="fas fa-play"></i></div>
        </div>`;
      } else {
        // Primera foto y las 2 siguientes cargan de inmediato; el resto usa lazy
        const mediaIdx = p.media.indexOf(m);
        const eager = mediaIdx < 3;
        return `<div class="slide">
          <img class="media-img" ${eager ? `src="${m}"` : `src="" data-src="${m}"`} alt="${p.title}" loading="${eager ? 'eager' : 'lazy'}">
          <div class="expand-icon"><i class="fas fa-search-plus"></i></div>
        </div>`;
      }
    }).join("");

    // Botón WhatsApp con mensaje prellenado
    const waMsg  = encodeURIComponent(`Hola, me interesa la propiedad: ${p.title} — $${formatNumber(p.price)} COP`);
    const waLink = `https://wa.me/${p.whatsapp || "573042465513"}?text=${waMsg}`;

    // Botón ubicación
    const mapsLink = p.location.startsWith("http") ? p.location : `https://www.google.com/maps?q=${encodeURIComponent(p.location)}`;

    const badgeClass = { arriendo: "badge-arriendo", compra: "badge-compra", lote: "badge-lote", arrendado: "badge-arrendado", vendido: "badge-vendido" }[p.type] || "badge-arriendo";
    const badgeLabel = { arriendo: "Arriendo", compra: "En venta", lote: "Lote", arrendado: "Arrendado", vendido: "Vendido" }[p.type] || p.type;
    const isUnavailable = p.type === "arrendado" || p.type === "vendido";
    const stampHtml = isUnavailable
      ? `<div class="unavailable-stamp stamp-${p.type}">${badgeLabel}</div>`
      : "";

    // Build feature chips (FincaRaíz style)
    const chips = [];
    if (p.rooms)    chips.push(`<span class="feat-chip"><i class="fas fa-bed"></i>${p.rooms} hab.</span>`);
    if (p.baths)    chips.push(`<span class="feat-chip"><i class="fas fa-bath"></i>${p.baths} baño${p.baths>1?'s':''}</span>`);
    if (p.area)     chips.push(`<span class="feat-chip"><i class="fas fa-ruler-combined"></i>${p.area} m²</span>`);
    if (p.parking)  chips.push(`<span class="feat-chip"><i class="fas fa-car"></i>${p.parking} parq.</span>`);
    if (p.stratum)  chips.push(`<span class="feat-chip"><i class="fas fa-layer-group"></i>Estrato ${p.stratum}</span>`);
    if (p.floor)    chips.push(`<span class="feat-chip"><i class="fas fa-building"></i>Piso ${p.floor}</span>`);

    // Location label
    const locationLabel = p.neighborhood
      ? `${p.neighborhood}${p.city ? ', ' + p.city : ''}`
      : (p.city || p.location || '');

    const priceLabel = p.type === 'arriendo' ? '/mes' : '';

    container.innerHTML += `
      <div class="card${isUnavailable ? ' unavailable' : ''}">
        <div class="slider">
          <div class="slides">${slides}</div>
          ${createDots(p.media.length)}
          <button class="arrow" style="left:10px" onclick="moveSlide(this,-1)">❮</button>
          <button class="arrow" style="right:10px" onclick="moveSlide(this,1)">❯</button>
          ${p.media.length > 1 ? `<div class="photo-count"><i class="fas fa-camera"></i>${p.media.length}</div>` : ''}
          <div class="expand-icon"><i class="fas fa-search-plus"></i></div>
          ${stampHtml}

        </div>
        <div class="card-content">
          <div class="card-meta">
            <span class="card-badge ${badgeClass}">${badgeLabel}</span>
          </div>
          <div class="card-top">
            <h3>${p.title}</h3>
            <div class="card-price-block">
              <span class="price">$${formatNumber(p.price)}</span>
              <span class="price-label">COP${priceLabel}</span>
            </div>
          </div>
          ${locationLabel ? `<div class="card-location"><i class="fas fa-map-marker-alt"></i>${locationLabel}</div>` : ''}
          ${chips.length ? `<div class="card-features">${chips.join('')}</div>` : ''}
          ${p.description ? `
          <p class="card-description" id="desc-${p._id}">${p.description}</p>
          <button class="ver-mas-btn" onclick="toggleDesc('desc-${p._id}', this)">Ver más <i class="fas fa-chevron-down" style="font-size:9px;margin-left:2px;"></i></button>
          ` : ''}
          <div class="card-actions">
            ${isUnavailable ? `
            <div class="action-btn" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.35);cursor:default;flex:1;border-radius:10px;display:flex;align-items:center;justify-content:center;gap:5px;padding:8px 0;font-size:12px;font-weight:600;">
              <i class="fas fa-ban"></i> No disponible
            </div>
            ` : `
            <a class="action-btn location" href="${mapsLink}" target="_blank">
              <i class="fas fa-map-marker-alt"></i> Ubicación
            </a>
            <a class="action-btn whatsapp" href="${waLink}" target="_blank">
              <i class="fab fa-whatsapp"></i> Me interesa
            </a>
            `}
          </div>
        </div>
      </div>`;
  });

  setTimeout(() => {
    bindMediaClicks();
    startAutoSliders();
    bindSliderSwipe();
    revealCards();
  }, 100);
}

/* =============================================
   CARGA INTELIGENTE DE FOTOS
   Carga la foto actual + precarga silenciosa
   de la siguiente y la anterior
   ============================================= */
function smartLoad(slider, currentIdx) {
  const imgs = slider.querySelectorAll(".media-img");
  const total = imgs.length;
  // Índices a cargar: actual + 2 siguientes + anterior
  const toLoad = [
    currentIdx,
    (currentIdx + 1) % total,
    (currentIdx + 2) % total,
    (currentIdx - 1 + total) % total
  ];
  toLoad.forEach(i => {
    const img = imgs[i];
    if (img && img.dataset.src) {
      img.src = img.dataset.src;
      delete img.dataset.src;
    }
  });
}

/* =============================================
   CLICKS EN MEDIOS → VISOR
   ============================================= */
function bindMediaClicks() {
  document.querySelectorAll(".card").forEach(card => {
    const imgs = Array.from(card.querySelectorAll(".media-img")).map(i => i.src || i.dataset.src);
    card.querySelectorAll(".media-img").forEach((el, idx) => {
      el.addEventListener("click", () => {
        // Resolver src real al momento del click
        const srcs = Array.from(card.querySelectorAll(".media-img")).map(i => i.src || i.dataset.src);
        openImage(el.src || el.dataset.src, srcs, idx);
      });
    });
  });
  document.querySelectorAll(".video-thumb-slide").forEach(slide => {
    const src = slide.getAttribute("data-video");
    slide.addEventListener("click", () => openVideo(src));
  });
}

/* =============================================
   SWIPE TÁCTIL EN SLIDERS DE CARDS
   ============================================= */
function bindSliderSwipe() {
  document.querySelectorAll(".slider").forEach(slider => {
    const slides = slider.querySelector(".slides");
    const dots   = slider.querySelectorAll(".dot");
    let startX = 0, startY = 0, moved = false;

    // Precarga inicial: foto 1 ya cargó, precarga foto 2
    smartLoad(slider, 0);

    slider.addEventListener("touchstart", e => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      moved  = false;
    }, { passive: true });

    slider.addEventListener("touchmove", e => {
      moved = true;
    }, { passive: true });

    slider.addEventListener("touchend", e => {
      if (!moved) return;
      const dx = e.changedTouches[0].clientX - startX;
      const dy = Math.abs(e.changedTouches[0].clientY - startY);
      if (Math.abs(dx) < 30 || dy > Math.abs(dx)) return;
      const total = slides.children.length;
      let index = parseInt(slides.dataset.index || "0");
      index = dx < 0
        ? (index + 1) % total
        : (index - 1 + total) % total;
      slides.style.transform = `translateX(-${index * 100}%)`;
      slides.dataset.index   = index;
      dots.forEach(d => d.classList.remove("active"));
      if (dots[index]) dots[index].classList.add("active");
      smartLoad(slider, index);
    }, { passive: true });
  });
}

/* =============================================
   AUTO SLIDER — DESACTIVADO
   ============================================= */
function startAutoSliders() {
  // Auto-paso desactivado por rendimiento
}

/* =============================================
   SLIDER MANUAL
   ============================================= */
function moveSlide(btn, dir) {
  const slider = btn.parentElement;
  const slides = slider.querySelector(".slides");
  const dots   = slider.querySelectorAll(".dot");
  const total  = slides.children.length;
  let index    = slides.dataset.index ? parseInt(slides.dataset.index) : 0;

  index = (index + dir + total) % total;
  slides.style.transform = `translateX(-${index * 100}%)`;
  slides.dataset.index   = index;
  dots.forEach(d => d.classList.remove("active"));
  if (dots[index]) dots[index].classList.add("active");
  smartLoad(slider, index);
}

function goToSlide(dot, i) {
  const slider = dot.closest(".slider");
  const slides = slider.querySelector(".slides");
  const dots   = slider.querySelectorAll(".dot");

  slides.style.transform = `translateX(-${i * 100}%)`;
  slides.dataset.index   = i;
  dots.forEach(d => d.classList.remove("active"));
  dots[i].classList.add("active");
  smartLoad(slider, i);
}

/* =============================================
   FILTRO POR TIPO
   ============================================= */
function setType(type, btn) {
  currentType = type;
  document.querySelectorAll(".btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  render();
}

/* =============================================
   VISOR — IMAGEN + VIDEO
   ============================================= */
(function initViewer() {
  const viewer    = document.getElementById("viewer");
  const viewerImg = document.getElementById("viewerImg");
  const viewerVid = document.getElementById("viewerVideo");
  const controls  = document.getElementById("videoControls");
  const closeBtn  = document.getElementById("viewerClose");
  const counter   = document.getElementById("viewerCounter");

  // Galería actual (cuando se abre una imagen se guarda el contexto)
  let gallery = [], galleryIdx = 0;

  /* ---- estado zoom ---- */
  let scale = 1, tx = 0, ty = 0;
  let isDragging = false, dragStartX = 0, dragStartY = 0;
  let pinchDist0 = null, scale0 = 1;
  let lastTap = 0;

  function applyTransform(animated) {
    viewerImg.style.transition = animated ? "transform 0.25s ease" : "none";
    viewerImg.style.transform  = `translate(${tx}px,${ty}px) scale(${scale})`;
  }

  function resetZoom(animated) {
    scale = 1; tx = 0; ty = 0;
    applyTransform(animated);
  }

  function clampTranslation() {
    // No dejar que la imagen se salga de la pantalla cuando está zoomeada
    const rect = viewerImg.getBoundingClientRect();
    const vw = window.innerWidth, vh = window.innerHeight;
    const maxX = Math.max(0, (rect.width  - vw)  / 2);
    const maxY = Math.max(0, (rect.height - vh) / 2);
    tx = Math.min(maxX, Math.max(-maxX, tx));
    ty = Math.min(maxY, Math.max(-maxY, ty));
  }

  /* ---- abrir imagen ---- */
  window.openImage = function(src, imgs, idx) {
    gallery    = imgs || [src];
    galleryIdx = idx  || 0;
    showGalleryImg(galleryIdx);
    viewerVid.style.display = "none";
    controls.style.display  = "none";
    viewer.classList.add("active");
    document.body.style.overflow = "hidden";
  };

  function showGalleryImg(idx) {
    galleryIdx = idx;
    viewerImg.src = gallery[idx];
    viewerImg.style.display = "block";
    resetZoom(false);
    counter.textContent = gallery.length > 1 ? `${idx + 1} / ${gallery.length}` : "";
  }

  /* ---- abrir video ---- */
  window.openVideo = function(src) {
    gallery = []; counter.textContent = "";
    viewerImg.style.display = "none";
    viewerVid.src            = src;
    viewerVid.style.display = "block";
    controls.style.display  = "flex";
    vcPlayPause.innerHTML   = '<i class="fas fa-pause"></i>';
    viewerVid.play();
    viewer.classList.add("active");
    document.body.style.overflow = "hidden";
  };

  /* ---- cerrar ---- */
  function closeViewer() {
    viewer.classList.remove("active");
    viewerVid.pause(); viewerVid.src = "";
    viewerImg.src = ""; gallery = [];
    document.body.style.overflow = "";
  }

  closeBtn.addEventListener("click", closeViewer);
  viewer.addEventListener("click", e => { if (e.target === viewer) closeViewer(); });
  document.addEventListener("keydown", e => {
    if (!viewer.classList.contains("active")) return;
    if (e.key === "Escape")     closeViewer();
    if (e.key === "ArrowRight") navigateGallery(1);
    if (e.key === "ArrowLeft")  navigateGallery(-1);
  });

  function navigateGallery(dir) {
    if (!gallery.length) return;
    showGalleryImg((galleryIdx + dir + gallery.length) % gallery.length);
  }

  /* ---- zoom rueda (desktop) ---- */
  viewer.addEventListener("wheel", e => {
    if (viewerImg.style.display === "none") return;
    e.preventDefault();
    scale = Math.min(5, Math.max(1, scale - e.deltaY * 0.002));
    if (scale === 1) { tx = 0; ty = 0; }
    applyTransform(false);
  }, { passive: false });

  /* ---- drag (desktop) ---- */
  viewerImg.addEventListener("mousedown", e => {
    if (scale <= 1) return;
    isDragging = true;
    dragStartX = e.clientX - tx;
    dragStartY = e.clientY - ty;
    viewerImg.style.cursor = "grabbing";
    e.preventDefault();
  });
  window.addEventListener("mouseup", () => {
    isDragging = false;
    viewerImg.style.cursor = "grab";
  });
  window.addEventListener("mousemove", e => {
    if (!isDragging) return;
    tx = e.clientX - dragStartX;
    ty = e.clientY - dragStartY;
    clampTranslation();
    applyTransform(false);
  });

  /* ---- touch en visor ---- */
  let touchX0 = 0, touchY0 = 0, touchMoved = false;

  viewerImg.addEventListener("touchstart", e => {
    touchMoved = false;
    if (e.touches.length === 2) {
      pinchDist0 = getPinchDist(e.touches);
      scale0     = scale;
    } else if (e.touches.length === 1) {
      touchX0    = e.touches[0].clientX;
      touchY0    = e.touches[0].clientY;
      dragStartX = e.touches[0].clientX - tx;
      dragStartY = e.touches[0].clientY - ty;
      isDragging = true;
    }
  }, { passive: true });

  viewerImg.addEventListener("touchmove", e => {
    touchMoved = true;
    e.preventDefault();
    if (e.touches.length === 2 && pinchDist0) {
      // Pinch zoom
      const d = getPinchDist(e.touches);
      scale = Math.min(5, Math.max(1, scale0 * (d / pinchDist0)));
      if (scale === 1) { tx = 0; ty = 0; }
      applyTransform(false);
    } else if (e.touches.length === 1 && isDragging) {
      if (scale > 1) {
        // Drag cuando zoomeado
        tx = e.touches[0].clientX - dragStartX;
        ty = e.touches[0].clientY - dragStartY;
        clampTranslation();
        applyTransform(false);
      }
    }
  }, { passive: false });

  viewerImg.addEventListener("touchend", e => {
    isDragging = false; pinchDist0 = null;

    if (!touchMoved && e.changedTouches.length === 1) {
      // Doble tap → toggle zoom
      const now = Date.now();
      if (now - lastTap < 300) {
        scale === 1 ? (scale = 2.5, applyTransform(true)) : resetZoom(true);
      }
      lastTap = now;
      return;
    }

    if (scale > 1 || e.changedTouches.length !== 1) return;

    const dx = e.changedTouches[0].clientX - touchX0;
    const dy = e.changedTouches[0].clientY - touchY0;

    if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 60) {
      // Swipe vertical → cerrar
      closeViewer();
    } else if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
      // Swipe horizontal → navegar galería
      navigateGallery(dx < 0 ? 1 : -1);
    }
  }, { passive: true });

  function getPinchDist(t) {
    const dx = t[0].clientX - t[1].clientX;
    const dy = t[0].clientY - t[1].clientY;
    return Math.sqrt(dx*dx + dy*dy);
  }

  /* ---- controles video ---- */
  const vcPlayPause  = document.getElementById("vcPlayPause");
  const vcProgress   = document.getElementById("vcProgress");
  const vcTime       = document.getElementById("vcTime");
  const vcMute       = document.getElementById("vcMute");
  const vcFullscreen = document.getElementById("vcFullscreen");

  vcPlayPause.addEventListener("click", () => {
    if (viewerVid.paused) { viewerVid.play(); vcPlayPause.innerHTML = '<i class="fas fa-pause"></i>'; }
    else { viewerVid.pause(); vcPlayPause.innerHTML = '<i class="fas fa-play"></i>'; }
  });
  viewerVid.addEventListener("timeupdate", () => {
    if (!viewerVid.duration) return;
    vcProgress.max = viewerVid.duration;
    vcProgress.value = viewerVid.currentTime;
    vcTime.textContent = fmtTime(viewerVid.currentTime) + " / " + fmtTime(viewerVid.duration);
  });
  vcProgress.addEventListener("input", () => { viewerVid.currentTime = vcProgress.value; });
  vcMute.addEventListener("click", () => {
    viewerVid.muted = !viewerVid.muted;
    vcMute.innerHTML = viewerVid.muted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
  });
  vcFullscreen.addEventListener("click", () => {
    if (viewerVid.requestFullscreen) viewerVid.requestFullscreen();
    else if (viewerVid.webkitEnterFullscreen) viewerVid.webkitEnterFullscreen();
  });
  viewerVid.addEventListener("ended", () => { vcPlayPause.innerHTML = '<i class="fas fa-play"></i>'; });
})();

/* =============================================
   VER MÁS / VER MENOS
   ============================================= */
function toggleDesc(id, btn) {
  const el = document.getElementById(id);
  const expanded = el.classList.toggle("expanded");
  btn.innerHTML = expanded
    ? 'Ver menos <i class="fas fa-chevron-up" style="font-size:9px;margin-left:2px;"></i>'
    : 'Ver más <i class="fas fa-chevron-down" style="font-size:9px;margin-left:2px;"></i>';
}

loadProperties();
